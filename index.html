<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 我的一周计划表</title>
<style>
  :root{
    --pink:#ff5fa2; --pink-bg:#ffe6f1; --pink-bd:#ffb3d4;
    --orange:#ff9b2f; --orange-bg:#fff0db; --orange-bd:#ffce93;
    --blue:#3aa0ff; --blue-bg:#e2f1ff; --blue-bd:#a9d6ff;
    --praise:#22b04b; --praise-bg:#e3f7e8; --praise-bd:#a8e6bb;
    --course:#9b6bff; --course-bg:#efe6ff; --course-bd:#cbb3ff;
    --meal:#36c08a; --meal-bg:#e2f8ee; --meal-bd:#a7e7cc;
    --free:#16b5b5; --free-bg:#dcf7f7; --free-bd:#9fe6e6;
    --listen:#9c6b3f; --listen-bg:#f3e7da; --listen-bd:#d9b88f;
    --ink:#3b3550; --soft:#8a82a3;
    --bg:#fff7fb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(circle at 10% 6%,#ffe0ef 0,transparent 36%),
      radial-gradient(circle at 92% 5%,#dcefff 0,transparent 34%),
      radial-gradient(circle at 50% 100%,#fff2cc 0,transparent 40%),
      var(--bg);
    color:var(--ink);min-height:100vh;padding:12px 14px 40px;
  }
  h1{font-size:22px;margin:0;display:flex;align-items:center;gap:8px;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .spread{justify-content:space-between;}

  .btn{background:#fff;border:2px solid #ffd0e6;color:var(--ink);
    padding:9px 14px;border-radius:14px;font-size:14px;font-weight:700;box-shadow:0 2px 0 #ffd0e6;white-space:nowrap;}
  .btn:active{transform:translateY(2px);box-shadow:none;}
  .btn.go{border-color:#a7e7cc;box-shadow:0 2px 0 #a7e7cc;}
  .btn.on{background:var(--course);color:#fff;border-color:var(--course);box-shadow:0 2px 0 #7a55d0;}
  .syncbadge{display:inline-block;font-size:12px;font-weight:800;padding:3px 11px;border-radius:11px;margin-top:6px;border:2px solid;}
  .syncbadge.local{color:#8a82a3;border-color:#ddd;background:#f6f4fa;}
  .syncbadge.connecting{color:#cf6f12;border-color:var(--orange-bd);background:var(--orange-bg);}
  .syncbadge.online{color:#1f8c63;border-color:var(--meal-bd);background:var(--meal-bg);}
  .syncbadge.error{color:#e3556e;border-color:#ffc6d2;background:#ffe7ec;}

  /* header strip */
  .head{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;margin:10px 0 14px;}
  .panel{background:#fff;border:2px solid #ffd9ec;border-radius:20px;padding:12px 16px;
    box-shadow:0 6px 16px rgba(255,140,190,.16);}
  .stars{flex:1 1 320px;display:flex;align-items:center;gap:14px;}
  .stars .lead{font-size:13px;color:var(--soft);}
  .chips{display:flex;gap:10px;flex-wrap:wrap;}
  .chip{display:flex;align-items:center;gap:6px;border-radius:16px;padding:8px 14px;font-weight:800;font-size:20px;border:2px solid #eee;}
  .chip small{font-size:11px;font-weight:600;}
  .chip.pink{border-color:var(--pink-bd);color:var(--pink);background:var(--pink-bg);}
  .chip.orange{border-color:var(--orange-bd);color:var(--orange);background:var(--orange-bg);}
  .chip.blue{border-color:var(--blue-bd);color:var(--blue);background:var(--blue-bg);}
  .chip.green{border-color:var(--praise-bd);color:var(--praise);background:var(--praise-bg);position:relative;}
  body.editmode .chip.green{cursor:pointer;box-shadow:0 0 0 3px rgba(34,176,75,.2);}
  .praiseminus{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;
    background:#fff;border:2px solid var(--praise-bd);color:var(--praise);font-weight:900;font-size:15px;
    line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.14);}
  body.editmode .praiseminus{display:inline-flex;}
  .starnote{flex:1 1 160px;font-size:13px;font-weight:800;color:#cf6f12;background:#fff6e6;
    border:2px dashed #ffd79a;border-radius:14px;padding:8px 12px;line-height:1.35;}
  .starnote .bigtime{font-size:21px;font-weight:900;color:#e3506e;letter-spacing:.5px;}

  /* pomodoro compact */
  .pomo{flex:0 0 auto;display:flex;align-items:center;gap:14px;}
  .ring-wrap{position:relative;width:86px;height:86px;flex:0 0 auto;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:#ffe4ef;stroke-width:9;}
  .ring-fg{fill:none;stroke:url(#pg);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .3s linear;}
  .clock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .clock .t{font-size:19px;font-weight:800;}
  .pomo-mid{display:flex;flex-direction:column;gap:6px;}
  .pomo-title{font-weight:800;font-size:14px;}
  .presets{display:flex;gap:5px;}
  .pre{background:#fff0f6;border:2px solid #ffd0e6;border-radius:10px;padding:4px 8px;font-weight:700;font-size:12px;color:var(--pink);}
  .pre.on{background:var(--pink);color:#fff;}
  .pre.setbtn{color:#1a1a1a;}
  .pomo-ctrl{display:flex;gap:6px;}
  .pomo-ctrl button{border-radius:11px;padding:7px 12px;font-size:13px;font-weight:800;color:#fff;}
  .start{background:linear-gradient(135deg,#7ee08a,#3fc66a);}
  .pause{background:linear-gradient(135deg,#ffb454,#ff8a3d);}
  .reset{background:linear-gradient(135deg,#b9a8d8,#9b8bc4);}
  .pomo-ctrl input{width:46px;padding:6px;border-radius:9px;border:2px solid #ffd0e6;text-align:center;font-size:13px;font-family:inherit;}
  .pstate{font-size:11px;color:var(--soft);}

  /* grid */
  .gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;position:relative;}
  table{border-collapse:separate;border-spacing:5px;width:100%;min-width:880px;table-layout:fixed;}
  .cell .ttl{word-break:break-word;}
  th,td{vertical-align:top;}
  th.day{background:#fff;border:2px solid #ffe0ef;border-radius:14px;padding:8px 4px;text-align:center;font-size:14px;color:var(--soft);}
  th.day.today{background:linear-gradient(135deg,#ff7fb6,#ff5fa2);color:#fff;border-color:#ff5fa2;}
  th.day small{display:block;font-size:11px;font-weight:500;margin-top:2px;}
  /* 冻结左侧时间列：左右滑动周一~周日时，时间列固定不动 */
  th.timehead{width:56px;background:var(--bg);border:none;position:sticky;left:0;z-index:5;}
  td.time{width:56px;text-align:right;padding-right:8px;font-weight:800;font-size:13px;color:var(--ink);
    vertical-align:top;padding-top:3px;position:sticky;left:0;z-index:5;background:var(--bg);}
  td.col{background:#fafafa;border:2px dashed #eee;border-radius:12px;height:46px;}
  td.todaycol{background:#fff0f6;}
  /* 工作日上午「上学中」合并块（不可编辑），整块填满上午高度、文字垂直居中 */
  td.schoolblock{background:#f1eef7;border:2px dashed #ddd5ea;border-radius:12px;
    color:#a99fc0;font-weight:800;font-size:14px;text-align:center;vertical-align:middle;writing-mode:horizontal-tb;}
  /* 工作日上午折叠条：固定「上学中」，不可点击 */
  td.schoolstrip{background:#f1eef7;border:2px dashed #ddd5ea;border-radius:12px;color:#8a7fa8;
    font-weight:800;font-size:13px;text-align:center;height:32px;}
  td.schoolspacer{background:transparent;border:none;}
  /* 周六日上午折叠条：蓝色、可点击展开/收起 */
  td.morningstrip{background:#e9f3ff;border:2px dashed #b9d6f5;border-radius:12px;color:#2f7fd0;
    font-weight:800;font-size:13px;text-align:center;cursor:pointer;height:32px;padding:0 6px;}
  td.morningstrip:hover{background:#daebff;color:#1f6fc0;}
  /* 整日高亮：一个边框把当天一整列框起来，而不是逐个任务描边 */
  #todayFrame{position:absolute;pointer-events:none;z-index:4;border:3px solid #ff5fa2;border-radius:16px;
    box-shadow:0 0 0 4px rgba(255,95,162,.16),0 6px 18px rgba(255,95,162,.22);}
  .cell{border-radius:12px;height:100%;min-height:42px;padding:7px 8px;position:relative;border:2px solid;display:flex;flex-direction:column;gap:2px;justify-content:center;}
  .cell .ttl{font-weight:800;font-size:13px;line-height:1.2;}
  .cell .tg{font-size:10px;font-weight:800;opacity:.85;}
  .cell.meal{background:var(--meal-bg);border-color:var(--meal-bd);color:#1f8c63;}
  .cell.free{background:var(--free-bg);border-color:var(--free-bd);color:#0e8a8a;}
  .cell.listen{background:var(--listen-bg);border-color:var(--listen-bd);color:#7a4f25;}
  .cell.course{background:var(--course-bg);border-color:var(--course-bd);color:#6b3fd0;}
  .cell.task{background:var(--pink-bg);border-color:var(--pink-bd);color:#c93b78;}
  .cell.sport{background:var(--orange-bg);border-color:var(--orange-bd);color:#cf6f12;}
  .cell.reading{background:var(--blue-bg);border-color:var(--blue-bd);color:#1f72c9;}
  .cell.done{opacity:.62;}
  .cell.done .ttl{text-decoration:line-through;}
  .check{position:absolute;right:5px;bottom:5px;width:34px;height:34px;border-radius:50%;
    border:2.5px dashed currentColor;background:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;color:inherit;}
  .check.done{border-style:solid;background:currentColor;}
  .check.done::after{content:'✓';color:#fff;font-weight:900;}
  .check:active{transform:scale(.85);}
  body.editmode td.col{cursor:pointer;}
  body.editmode td.col:hover{outline:3px solid #ffd0e6;}
  body.editmode .check{display:none;}
  .editbadge{display:none;}
  body.editmode .editbadge{display:inline;}

  .banner{background:linear-gradient(135deg,#fff3c4,#ffe08a);border-radius:14px;padding:8px 14px;
    font-weight:800;margin-bottom:10px;border:2px solid #ffd24d;color:#9a6b00;font-size:14px;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--soft);margin:6px 2px 12px;}
  .legend b{display:inline-flex;align-items:center;gap:5px;font-weight:700;}
  .sw{width:14px;height:14px;border-radius:5px;display:inline-block;border:2px solid;}

  /* fx */
  #fx{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden;}
  .fly{position:absolute;will-change:transform,opacity;}

  /* modal */
  .mask{position:fixed;inset:0;background:rgba(60,40,70,.45);display:none;z-index:100;align-items:center;justify-content:center;padding:18px;}
  .mask.show{display:flex;}
  .modal{background:#fff;border-radius:22px;max-width:440px;width:100%;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .modal h2{margin:0 0 12px;font-size:19px;}
  .modal label{font-size:12px;color:var(--soft);display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
  .modal input,.modal select{padding:11px;border-radius:12px;border:2px solid #eadcf0;font-size:15px;font-family:inherit;}
  .typepick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
  .typepick button{padding:10px 4px;border-radius:12px;border:2px solid #eee;background:#fff;font-weight:800;font-size:13px;}
  .typepick button[data-on="1"]{color:#fff;}
  .modal-foot{display:flex;gap:8px;justify-content:space-between;margin-top:8px;}
  .save{background:linear-gradient(135deg,#ff7fb6,#ff5fa2);color:#fff;padding:11px 20px;border-radius:14px;font-weight:800;}
  .ghost{background:#f4eef8;color:var(--soft);padding:11px 16px;border-radius:14px;font-weight:700;}
  .danger{background:#ffe7ec;color:#e3556e;padding:11px 16px;border-radius:14px;font-weight:700;}
  .foot{font-size:12px;color:var(--soft);text-align:center;margin-top:18px;line-height:1.7;}
  table.detail{border-collapse:collapse;width:100%;min-width:0;border-spacing:0;}
  table.detail th,table.detail td{border:1px solid #eee5f2;padding:9px 6px;text-align:center;font-size:14px;}
  table.detail thead th{background:#fbf3ff;color:var(--soft);font-size:13px;}
  table.detail td.dname{font-weight:800;color:var(--ink);}
  table.detail tr.istoday td{background:#fffaf0;}
  table.detail tr.istoday td.dname{color:var(--pink);}
  table.detail td.cp{color:var(--pink);font-weight:800;}
  table.detail td.co{color:var(--orange);font-weight:800;}
  table.detail td.cb{color:var(--blue);font-weight:800;}
  table.detail td.cg{color:var(--praise);font-weight:800;}
  table.detail td.sum{font-weight:900;}
  table.detail tr.totrow td{background:#fdf1f7;font-weight:900;border-top:2px solid #ffd0e6;}
  .bookpick{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0 6px;}
  .bookbtn{width:58px;height:58px;border-radius:16px;border:2px solid var(--blue-bd);
    background:var(--blue-bg);color:var(--blue);font-weight:900;font-size:20px;display:flex;
    flex-direction:column;align-items:center;justify-content:center;line-height:1;box-shadow:0 3px 0 var(--blue-bd);}
  .bookbtn small{font-size:11px;font-weight:700;margin-top:2px;}
  .bookbtn:active{transform:translateY(3px);box-shadow:none;}
  .passbox{width:170px;text-align:center;letter-spacing:14px;font-size:30px;font-weight:800;
    padding:12px 10px 12px 24px;border-radius:16px;border:2.5px solid var(--pink-bd);
    background:var(--pink-bg);color:var(--pink);font-family:inherit;outline:none;}
  .passbox:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,95,162,.15);}
  .passerr{color:#e3556e;font-size:13px;font-weight:700;height:20px;margin:10px 0 2px;}
</style>
</head>
<body>

<div class="row spread">
  <div>
    <h1>🌈 我的一周计划表</h1>
    <div class="pstate" id="todayLine" style="font-size:13px;margin-top:3px;"></div>
    <span id="syncBadge" class="syncbadge local">📴 仅本机</span>
  </div>
  <div class="row">
    <button class="btn" id="editToggle" onclick="toggleEdit()">✏️ 家长编辑</button>
    <button class="btn" onclick="openDetail()">📊 最近7天</button>
  </div>
</div>

<div class="head">
  <div class="panel stars">
    <div class="lead">今天<br>得到</div>
    <div class="chips">
      <div class="chip pink">⭐<span id="cPink">0</span><small>任务星</small></div>
      <div class="chip orange">⭐<span id="cOrange">0</span><small>运动星</small></div>
      <div class="chip blue">⭐<span id="cBlue">0</span><small>阅读星</small></div>
      <div class="chip green" id="praiseChip" onclick="awardPraise(1)" title="家长编辑模式下点一下 +1 颗你真棒">⭐<span id="cGreen">0</span><small>你真棒</small><button class="praiseminus" onclick="event.stopPropagation();awardPraise(-1)">−</button></div>
    </div>
    <div class="starnote">🕗 每天 <span class="bigtime">20:10</span> 和妈妈视频盘点星星 ⭐</div>
  </div>
  <div class="panel pomo">
    <div class="ring-wrap">
      <svg width="86" height="86" viewBox="0 0 86 86">
        <defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ff8a3d"/><stop offset="1" stop-color="#ff5fa2"/></linearGradient></defs>
        <circle class="ring-bg" cx="43" cy="43" r="37"/>
        <circle class="ring-fg" id="ring" cx="43" cy="43" r="37"/>
      </svg>
      <div class="clock"><div class="t" id="clock">25:00</div></div>
    </div>
    <div class="pomo-mid">
      <div class="pomo-title">🍅 番茄专注钟</div>
      <div class="presets" id="presets"></div>
      <div class="pomo-ctrl">
        <button class="start" id="startBtn" onclick="pomoToggle()">▶ 开始</button>
        <button class="reset" onclick="pomoReset()">↺</button>
        <input type="number" id="customMin" min="1" max="120" value="25" title="自定义分钟">
        <button class="pre setbtn" onclick="setCustom()">设定</button>
      </div>
      <div class="pstate" id="pstate">准备好啦</div>
    </div>
  </div>
</div>

<div id="banner"></div>
<div class="gridwrap"><div id="grid"></div></div>

<div class="foot">
  星星按「日期」记录，明细只看最近7天，页面只显示今天的，旧记录自动滚动清除<br>
  ☁️ 你和孩子打开同一链接即<b>实时互通</b>，打勾/星星自动同步，无需任何手动操作
</div>

<div id="fx"></div>

<!-- weekly detail -->
<div class="mask" id="detailMask">
  <div class="modal" style="max-width:520px">
    <h2 id="detailTitle">📊 最近7天星星明细</h2>
    <div id="detailBody"></div>
    <div class="modal-foot" style="justify-content:flex-end">
      <button class="save" onclick="document.getElementById('detailMask').classList.remove('show')">关闭</button>
    </div>
  </div>
</div>

<!-- parent password -->
<div class="mask" id="passMask">
  <div class="modal" style="max-width:330px;text-align:center">
    <div style="font-size:40px;line-height:1;margin-bottom:6px">🔒</div>
    <h2 style="justify-content:center">家长验证</h2>
    <div style="font-size:13px;color:var(--soft);margin:-4px 0 14px">请输入 4 位家长密码</div>
    <input id="passInput" class="passbox" type="password" inputmode="numeric" maxlength="4"
      placeholder="••••" autocomplete="off"
      oninput="passInputChange(this.value)" onkeydown="if(event.key==='Enter')submitPass()">
    <div id="passErr" class="passerr"></div>
    <div class="modal-foot" style="justify-content:center;gap:10px">
      <button class="ghost" onclick="closePass()">取消</button>
      <button class="save" onclick="submitPass()">进入编辑</button>
    </div>
  </div>
</div>

<!-- reading book-count picker -->
<div class="mask" id="bookMask">
  <div class="modal" style="max-width:360px;text-align:center">
    <h2 style="justify-content:center">📚 今天读了几本书？</h2>
    <div style="font-size:13px;color:var(--soft);margin-bottom:6px">读几本就拍照几本给妈妈，得到几个 🔵 阅读星</div>
    <div class="bookpick" id="bookPick"></div>
    <div class="modal-foot" style="justify-content:center">
      <button class="ghost" onclick="closeBook()">取消</button>
    </div>
  </div>
</div>

<!-- cell editor -->
<div class="mask" id="mask">
  <div class="modal">
    <h2 id="mTitle">填写格子</h2>
    <label>内容（留空=清除这格）
      <input type="text" id="eTitle" placeholder="例如：乐读语文">
    </label>
    <label>类型
      <div class="typepick" id="typepick"></div>
    </label>
    <label>时长
      <select id="eSpan">
        <option value="1">30 分钟</option>
        <option value="2">1 小时</option>
        <option value="3">1.5 小时</option>
        <option value="4">2 小时</option>
      </select>
    </label>
    <div class="modal-foot">
      <button class="danger" onclick="clearCell()">🗑 清除</button>
      <div class="row">
        <button class="ghost" onclick="closeModal()">取消</button>
        <button class="save" onclick="saveCell()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase 实时数据库 SDK（离线/未配置时会自动跳过，不影响本机使用） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const DAYS=['周一','周二','周三','周四','周五','周六','周日'];
const SLOTS=['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00'];
const NSLOT=SLOTS.length; // 25 行（08:00~20:00）
const MORNING_END=SLOTS.indexOf('13:30'); // =11，工作日上午(8:00~13:00)用「上学中」合并块
const SCHEMA_V=2; // s 坐标版本：v2 从 08:00 起算；旧 v1 从 13:30 起算，迁移时 s += 偏移(=MORNING_END)
function migrateActs(arr,fromV){if((fromV||1)<SCHEMA_V){arr.forEach(a=>{if(typeof a.s==='number')a.s+=MORNING_END;});}return arr;}
const TYPE={
  meal:{tag:'日程',star:null},
  free:{tag:'自由',star:null},
  listen:{tag:'听力',star:null},
  course:{tag:'课程',star:null},
  task:{tag:'任务',star:'pink'},
  sport:{tag:'运动',star:'orange'},
  reading:{tag:'阅读',star:'blue'},
};
const STAR_COLOR={pink:'#ff5fa2',orange:'#ff9b2f',blue:'#3aa0ff',green:'#22b04b'};

// keep only a rolling window: last 14 days + the 7 columns of the current week
function prune(){
  const keep=new Set();const t=new Date();t.setHours(0,0,0,0);
  for(let i=0;i<14;i++){const d=new Date(t);d.setDate(t.getDate()-i);keep.add(isoOf(d));}
  for(let d=0;d<7;d++)keep.add(colISO(d));
  for(const k in prog.stars){if(!keep.has(k))delete prog.stars[k];}
  for(const k in prog.done){if(!keep.has(k.split('|')[0]))delete prog.done[k];}
}

function toggleDone(id,el){
  const a=acts.find(x=>x.id===id);if(!a)return;const star=TYPE[a.y].star;if(!star)return;
  // 完成状态 + 星星都归属「完成的那一天」(今天)。没完成的任务在任何一天都显示未完成。
  const di=todayISO(),key=di+'|'+id,s=dateStars(di);
  if(prog.done[key]){
    // 取消完成：扣回当时记录的星星数（阅读可能是 1~5 颗）
    const cnt=typeof prog.done[key]==='number'?prog.done[key]:1;
    delete prog.done[key];s[star]=Math.max(0,s[star]-cnt);
    save('sp_prog',prog);pushProg();renderGrid();renderStars();
  }else{
    if(a.y==='reading'){openBook(id);return;} // 阅读：先选「几本」
    prog.done[key]=1;s[star]++;burst(el,star);ding();
    save('sp_prog',prog);pushProg();renderGrid();renderStars();
  }
}

// ---- star burst ----
function burst(srcEl,star){
  const fx=document.getElementById('fx');const r=srcEl.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2,color=STAR_COLOR[star];
  const main=document.createElement('div');main.className='fly';main.textContent='⭐';
  main.style.left=cx+'px';main.style.top=cy+'px';main.style.fontSize='42px';main.style.filter=`drop-shadow(0 0 6px ${color})`;
  fx.appendChild(main);
  main.animate([{transform:'translate(-50%,-50%) scale(.2)',opacity:1},
    {transform:'translate(-50%,-180%) scale(1.7)',opacity:1,offset:.6},
    {transform:'translate(-50%,-260%) scale(1)',opacity:0}],{duration:1100,easing:'cubic-bezier(.2,.9,.3,1)'}).onfinish=()=>main.remove();
  for(let i=0;i<10;i++){
    const p=document.createElement('div');p.className='fly';p.textContent=['✨','⭐','💫','🌟'][i%4];
    p.style.left=cx+'px';p.style.top=cy+'px';p.style.fontSize=(13+Math.random()*14)+'px';fx.appendChild(p);
    const ang=Math.PI*2*i/10+Math.random(),dist=60+Math.random()*70;
    p.animate([{transform:'translate(-50%,-50%) scale(.3)',opacity:1},
      {transform:`translate(${Math.cos(ang)*dist-50}%,${Math.sin(ang)*dist-50}%) scale(1)`,opacity:1,offset:.7},
      {transform:`translate(${Math.cos(ang)*dist*1.3-50}%,${Math.sin(ang)*dist*1.3-50}%) scale(.4)`,opacity:0}],
      {duration:900+Math.random()*400,easing:'ease-out'}).onfinish=()=>p.remove();
  }
}
let AC;function tone(f,dur,type='sine',vol=.15){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);o.start();o.stop(AC.currentTime+dur);}catch(e){}}
function ding(){tone(880,.12);setTimeout(()=>tone(1320,.18),90);}

function pomoToggle(){pRun?pomoStop():pomoStart();}

// 删除某个日程在 prog 里累计的星星记录（被覆盖/删除时调用）
function purgeActStars(id){
  const a=acts.find(x=>x.id===id);if(!a)return;const star=TYPE[a.y].star;
  Object.keys(prog.done).forEach(k=>{if(k.endsWith('|'+id)){const di=k.split('|')[0];
    const cnt=typeof prog.done[k]==='number'?prog.done[k]:1;
    if(star&&prog.stars[di])prog.stars[di][star]=Math.max(0,prog.stars[di][star]-cnt);delete prog.done[k];}});
}
function saveCell(){
  const t=document.getElementById('eTitle').value.trim();
  const span=parseInt(document.getElementById('eSpan').value)||1;
  if(!t){clearCell();return;}
  let selfId,day,s0;
  if(editTarget.id){const a=acts.find(x=>x.id===editTarget.id);Object.assign(a,{t,y:pickType,span});selfId=a.id;day=a.d;s0=a.s;}
  else{selfId=nid();acts.push({id:selfId,d:editTarget.d,s:editTarget.s,span,t,y:pickType});day=editTarget.d;s0=editTarget.s;}
  // 只删除“同一天且时间段重叠”的其它日程，未重叠的一律不动
  const e0=s0+span-1;
  const overlapping=acts.filter(x=>x.id!==selfId&&x.d===day&&!(x.s+x.span-1<s0||x.s>e0));
  if(overlapping.length){
    overlapping.forEach(x=>purgeActStars(x.id));
    const ids=new Set(overlapping.map(o=>o.id));
    acts=acts.filter(x=>!ids.has(x.id));
    save('sp_prog',prog);pushProg();
  }
  save('sp_acts',acts);pushPlan();closeModal();renderGrid();renderStars();
}

    const sum=s.pink+s.orange+s.blue+g;tp+=s.pink;to+=s.orange;tb+=s.blue;tg+=g;
    const lbl=`${dt.getMonth()+1}/${dt.getDate()} ${DAYS[(dt.getDay()+6)%7]}`;
    h+=`<tr class="${isToday?'istoday':''}"><td class="dname">${lbl}${isToday?' ·今天':''}</td>
      <td class="cp">${s.pink}</td><td class="co">${s.orange}</td><td class="cb">${s.blue}</td><td class="cg">${g}</td><td class="sum">${sum}</td></tr>`;
  }
  h+=`<tr class="totrow"><td>7天合计</td><td class="cp">${tp}</td><td class="co">${to}</td><td class="cb">${tb}</td><td class="cg">${tg}</td><td class="sum">${tp+to+tb+tg}</td></tr>`;
  h+='</tbody></table>';
  document.getElementById('detailBody').innerHTML=h;
  document.getElementById('detailMask').classList.add('show');
}

// ====== 实时同步（Firebase 实时数据库）======
// 用法：去 Firebase 建一个免费项目，把下面 firebaseConfig 换成你自己的配置即可开启实时同步。
// 不填（保持占位文字）则自动只在本机使用，其它功能照常。你和孩子用同一份文件、同一个 ROOM 就能互通。
const firebaseConfig = {
  apiKey: "AIzaSyACvEmJFu_tJpagvx0tL_nyoG64kGuHYDo",
  authDomain: "eileen-plan-4c5c3.firebaseapp.com",
  databaseURL: "https://eileen-plan-4c5c3-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "eileen-plan-4c5c3",
  storageBucket: "eileen-plan-4c5c3.firebasestorage.app",
  messagingSenderId: "650388219751",
  appId: "1:650388219751:web:e17c30e044ba4fb02531c2"
};
const ROOM = "eileen-7gq4m9x2kd"; // 房间码：你和孩子保持一致即可同步；想重开一组就改这个名字

let remoteRef=null, applyingRemote=false;
function syncStatus(st){
  const b=document.getElementById('syncBadge');if(!b)return;
  const map={local:['local','📴 仅本机'],connecting:['connecting','⏳ 连接中…'],online:['online','☁️ 已同步'],error:['error','⚠️ 同步出错']};
  const m=map[st]||map.local;b.className='syncbadge '+m[0];b.textContent=m[1];
}
function syncReady(){return typeof firebase!=='undefined'&&firebaseConfig.apiKey&&!/在这里|粘贴|YOUR_/.test(firebaseConfig.apiKey);}
function initSync(){
  if(!syncReady()){syncStatus('local');return;}
  try{
    if(!firebase.apps||!firebase.apps.length)firebase.initializeApp(firebaseConfig);
    const db=firebase.database();
    remoteRef=db.ref('plans/'+ROOM);
    syncStatus('connecting');
    db.ref('.info/connected').on('value',s=>{syncStatus(s.val()?'online':'connecting');});
    remoteRef.on('value',snap=>{
      const v=snap.val();
      if(!v){pushPlan();pushProg();return;} // 房间为空 → 用本机数据做种子
      applyingRemote=true;
      let needMigratePush=false;
      if(v.plan&&v.plan.acts){
        acts=v.plan.acts;
        if((v.plan.schemaV||1)<SCHEMA_V){migrateActs(acts,v.plan.schemaV);needMigratePush=true;} // 一次性把旧坐标(13:30起)迁到新坐标(8:00起)
        acts.forEach(a=>{if(!a.id)a.id=nid();});notes=v.plan.notes||{};
        save('sp_acts',acts);save('sp_notes',notes);save('sp_schemaV',SCHEMA_V);
      }
      if(v.prog){prog={done:v.prog.done||{},stars:v.prog.stars||{}};prune();save('sp_prog',prog);}
      applyingRemote=false;renderAll();
      if(needMigratePush)pushPlan(); // 把迁移后的数据写回，其它设备就拿到新坐标
    },err=>{syncStatus('error');});
  }catch(e){console.warn('sync init fail',e);syncStatus('error');}
}
function pushPlan(){if(remoteRef&&!applyingRemote)remoteRef.child('plan').set({acts,notes,schemaV:SCHEMA_V,ts:Date.now()}).catch(e=>{console.warn('pushPlan fail',e);syncStatus('error');});}
function pushProg(){if(remoteRef&&!applyingRemote)remoteRef.child('prog').set({done:prog.done,stars:prog.stars,ts:Date.now()}).catch(e=>{console.warn('pushProg fail',e);syncStatus('error');});}

// ---- init ----
prune();renderPresets();drawPomo();renderAll();initSync();
let _lastISO=todayISO();
setInterval(()=>{const now=todayISO();if(now!==_lastISO){_lastISO=now;prune();save('sp_prog',prog);pushProg();renderAll();}else renderStars();},60000);
</script>
